<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
        }

        input[type="text"] {
            width: 80px;
            padding: 8px;
            margin-right: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        p {
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Number Guessing Game</h1>
        <p>Guess a number between 1 and 100:</p>
        <input type="text" id="guess">
        <button id="btn">Submit</button>
        <p id="msg"></p>
    </div>
    <script>
        let guess;
        const btn = document.getElementById('btn');
        const msg = document.getElementById('msg');
        const num = Math.floor(Math.random() * 100);
        console.log(num);
        btn.onclick = function () {
            guess = Number(document.getElementById('guess').value);
            if (guess == '') {
                msg.textContent = "Cant be empty ! "
                msg.style.color = "red";
            }
            else if (isNaN(guess)) {

                msg.textContent = "Enter a Valid number "
                msg.style.color = "red";
            }
            else if (guess > 100) {
                msg.textContent = "Number is out of range !"
                msg.style.color = "Red";
            }
            else {
                if (guess == num) {
                    msg.textContent = "You Entered correct number ! "
                    msg.style.color = "Green";
                }
                else if (guess > num) {
                    if (guess - num <= 5) {
                        msg.textContent = "You are close to number !"
                        msg.style.color = "brown";
                    }
                    else if (guess - num <= 20) {
                        msg.textContent = "Guess is high !"
                        msg.style.color = "Red";
                    }
                    else {
                        msg.textContent = "Guess is too high ! "
                        msg.style.color = "Red";
                    }
                }
                else if (guess < num) {
                    if (num - guess <= 5) {
                        msg.textContent = "You are close to number !"
                        msg.style.color = "Red";
                    }
                    else if (num - guess <= 20) {
                        msg.textContent = "Guess is low !"
                        msg.style.color = "Red";
                    }
                    else {
                        msg.textContent = "Guess is too Low ! "
                        msg.style.color = "Red";
                    }
                }
            }
        }  
    </script>
</body>

</html>
