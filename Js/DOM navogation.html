<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body {
            padding: 10px;
            display: flex;
            align-items: center;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 40px;
            min-height: 50px;
            width: 550px;
            border-radius: 5px;
            border: 2px solid black;
            background-color: rgb(255, 253, 253);

        }

        .container>p {
            padding: 10px;
            margin: 3px 3px 3px 3px;
            background-color: rgba(101, 97, 97, 0.699);
            border-radius: 10px;
            width: 525px;
            font-size: 25px;
        }

        button {
            margin: 10px 180px 5px 0px;
            width: 150px;
            min-width: 100px;
            height: 45px;
            padding: 8px;
            border-radius: 5px;
            border: 2.5px solid #E0E1E4;
            box-shadow: 0px 0px 20px -20px;
            cursor: pointer;
            background-color: white;
            transition: all 0.2s ease-in-out 0ms;
            user-select: none;
            font-family: 'Poppins', sans-serif;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
        }

        button:hover {
            background-color: #F2F2F2;
            box-shadow: 0px 0px 20px -18px;
        }

        button:active {
            transform: scale(0.95);
        }

        .popup {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 250px;
            height: 60px;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: none;
            animation: bounce 0.5s;
        }

        @keyframes bounce {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .group {
            display: flex;
            align-items: center;
            position: relative;
            max-width: 300px;
            margin: 0 auto;
            margin-bottom: 10px;
        }

        .input {
            width: 100%;
            height: 40px;
            line-height: 28px;
            padding: 0 1rem;
            padding-left: 2.5rem;
            border: 2px solid transparent;
            border-radius: 8px;
            outline: none;
            background-color: #f3f3f4;
            color: #0d0c22;
            transition: 0.3s ease;
        }

        .input::placeholder {
            color: #9e9ea7;
        }

        .input:focus,
        input:hover {
            outline: none;
            border-color: rgba(247, 127, 0, 0.4);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgb(247 127 0 / 10%);
        }

        #btn2 {
            margin-top: -50px;
            margin-right: -200px;
            width: 190px;
        }
    </style>
</head>

<body>
    <div class="group">
        <input id='input' class="input" type="search" placeholder="Enter the task " />
    </div>
    <div class="popup">
        No more Task to  delete
    </div>
    <h1>
        To - Do- App
    </h1>
    <div class="container" id="container">

    </div>
    <button id="btn" accesskey="a">Click to add Add task</button>
    <button id="btn2" accesskey="r">Click Task to remove them </button>
    <script>
        let input = document.getElementById('input')
        let model = document.querySelector('.popup');
        let elm3 = document.querySelector('.container');
        let elm4 = document.querySelectorAll('.container');
        count=1;

        let btn = document.getElementById('btn');
        let btn2 = document.getElementById('btn2');
        btn.onclick = () => {
           
            let addElement = document.createElement('p');
            task = input.value;
            addElement.textContent = `${count++}. ${task}`;
            addElement.onclick = () => {
                addElement.style.textDecoration = 'line-through';
                setTimeout(()=>{addElement.remove()},500) 
            };
            elm3.appendChild(addElement);
            elm3.style.height = 'auto';
            input.value = ""   
        }
        btn2.onclick = () => {
            if (elm3.lastChild) {
                elm3.removeChild(elm3.lastChild);
            }
            if (elm3.children.length === 0) {
                model.style.display = 'flex';
                setTimeout(() => {
                    model.style.display = 'none';
                }, 2000);
            }
        }
    </script>
</body>

</html>
