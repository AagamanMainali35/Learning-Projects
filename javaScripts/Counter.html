<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 50px;
            margin-top: 60px;
            text-align: center; 
        }
        .counter {
            border: 2px solid black;
            width:fit-content;
            margin: 0 auto;
            margin-top: 10%;
         
        }
        button {
            color: white;
            padding: 15px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid black;
            background-color: rgb(48, 51, 50);
            font-size: 20px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            cursor: pointer; /* Show pointer cursor on hover */
        }
        button:active {
            transform: translate(0.9px,0.9px);
            transition: transform 0.3s ease;
        }
        p{
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="counter">
        <h1 id="con">0</h1>
        <button type="button" id="increase">Increase</button>
        <button type="button" id="reset">Reset</button>
        <button type="button" id="decrease">Decrease</button>

    </div>
    <script>
        let value = 0;
        const counters = document.getElementById("p");
        const counter = document.getElementById("con");
        const increase = document.getElementById("increase");
        const decrease = document.getElementById("decrease");
        const reset = document.getElementById("reset");
        increase.onclick = function() {
            value= value+1;
            counter.textContent = value;
        
        };
        decrease.onclick = function() {
            if (value > 0) {
                value=value-1;
                counter.textContent = value;
            } else {
                window.alert("Cannot decrease below zero");
            }
        };
        reset.onclick = function() {
            value = 0;
            counter.textContent = value;
        };
    </script>
</body>
</html>
